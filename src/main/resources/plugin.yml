name: LifeMoreMythicMobs
version: @version@
main: net.azisaba.lifemoremythicmobs.LifeMoreMythicMobs
api-version: 1.15

depend: [MythicMobs]
load: STARTUP

commands:
  lmmm:
    aliases: [lmm]
    description: Main command of LifeMoreMythicMobs

permissions:
  lifemoremythicmobs.lmmm:
    description: Allows use of all LifeMoreMythicMobs commands
    default: op
  lifemoremythicmobs.command.spawner:
    description: Allows use of /lmmm spawner command
    default: op
  lifemoremythicmobs.command.upgrade:
    description: Allows use of /lmmm upgrade command
    default: true
  lifemoremythicmobs.command.stats:
    description: Allows use of /lmmm stats command
    default: true
  lifemoremythicmobs.command.findmythicitem:
    description: Allows use of /lmmm findMythicItem command
    default: op
  lifemoremythicmobs.command.findmythicmob:
    description: Allows use of /lmmm findMythicMob command
    default: op